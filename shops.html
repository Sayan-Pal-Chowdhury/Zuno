<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zuno Shops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shop.css?v=25">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffda00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Zuno">
  <link rel="apple-touch-icon" href="zuno-icon-192.png">
</head>
<body>
  <div id="shop-topbar"></div>
  <main class="shop-main">
    <section class="marketplace-hero" id="marketplaceHero">
      <div class="marketplace-hero-track" id="marketplaceHeroTrack">
        <article class="marketplace-hero-slide">
          <div class="marketplace-hero-copy">
            <small>Available near you</small>
            <h1>Shop from local stores</h1>
            <p>Fresh stock, live availability, simple ordering.</p>
            <div class="public-login-actions">
              <a class="public-login-btn primary" href="login.html">Vendor Login</a>
              <a class="public-login-btn" href="customer-login.html">Customer Login</a>
            </div>
          </div>
        </article>
      </div>
      <div class="marketplace-hero-dots" id="marketplaceHeroDots"></div>
    </section>

    <section class="customer-strip" id="customerStrip" hidden></section>

    <div class="toolbar">
      <input class="search-input" id="shopSearch" type="search" placeholder="Search shops..." oninput="filterShops()" onsearch="filterShops()">
    </div>

    <div id="browseFilters">
      <div class="section-head category-head">
        <h2>Explore local</h2>
        <button class="section-link" type="button" onclick="setMarketplaceCategory('all', this)">All</button>
      </div>

      <div class="category-row marketplace-category-row" id="marketplaceCategoryRow"></div>

      <div class="section-head category-head">
        <h2>Shop types nearby</h2>
        <span id="typeCount">All</span>
      </div>

      <div class="shop-type-scroll" id="businessTypeRow"></div>
    </div>

    <div class="section-head">
      <h2 id="shopsHeading">Open Shops</h2>
      <span id="shopCount">Loading</span>
    </div>

    <section class="shops-grid" id="shopsGrid">
      <article class="shop-card skeleton-shop-card">
        <div class="skeleton-row">
          <div class="skeleton-pill"></div>
          <div class="skeleton-pill small"></div>
        </div>
        <div>
          <div class="skeleton-line wide"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line short"></div>
        </div>
      </article>
      <article class="shop-card skeleton-shop-card">
        <div class="skeleton-row">
          <div class="skeleton-pill"></div>
          <div class="skeleton-pill small"></div>
        </div>
        <div>
          <div class="skeleton-line wide"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line short"></div>
        </div>
      </article>
    </section>
  </main>

  <script type="module" src="shops.js?v=25"></script>
  <script src="pwa.js" defer></script>
</body>
</html>
