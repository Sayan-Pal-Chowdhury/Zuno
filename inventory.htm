<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory — Sales Tracker</title>
  <link rel="stylesheet" href="style.css?v=46">
  <link rel="stylesheet" href="inventory.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00236f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Zuno">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="zuno-icon-192.png">
</head>

<body>

<h1>Inventory</h1>

<!-- LOW STOCK ALERTS -->
<div id="alertBox" class="alert-box hidden"></div>

<div style="max-width:860px;margin:0 auto 18px;display:flex;justify-content:flex-end;">
  <button class="btn-primary" onclick="openAddStockModal()">+ Add Stock</button>
</div>

<!-- EDIT PURCHASE ENTRY MODAL -->
<div id="editModal" class="modal-overlay hidden">
  <div class="modal-box" style="max-width:720px;">
    <h3 style="margin-bottom:16px;font-size:16px;font-weight:600;">Edit Stock Entry</h3>
    <p style="font-size:12px;color:var(--text-muted);margin:-8px 0 14px;">Correct this purchase entry. Current stock and linked payment totals will be recalculated.</p>
    <div class="stock-form">
      <div class="form-group"><label>Product Name</label><input type="text" id="editProduct"></div>
      <div class="form-group"><label>Quantity Bought</label><input type="number" id="editQty"></div>
      <div class="form-group">
        <label>Unit</label>
        <select id="editUnit"><option value="kg">kg</option><option value="g">gram</option><option value="piece">piece</option></select>
      </div>
      <div class="form-group"><label>Total Purchase Cost (Rs)</label><input type="number" id="editPurchaseCost"></div>
      <div class="form-group"><label>Selling Price / Unit (Rs)</label><input type="number" id="editSellingPrice" placeholder="e.g. 30"></div>
      <div class="form-group">
        <label>Selling Unit</label>
        <select id="editSellingUnit">
          <option value="kg">kg</option>
          <option value="500g">500g</option>
          <option value="250g">250g</option>
          <option value="100g">100g</option>
          <option value="g">gram</option>
          <option value="piece">piece</option>
        </select>
      </div>
      <div class="form-group"><label>Purchase Date</label><input type="date" id="editDate"></div>
      <div class="form-group"><label>Low Stock Alert (qty)</label><input type="number" id="editAlert"></div>
      <div class="form-group"><label>Vendor Name (optional)</label><input type="text" id="editVendorName"></div>
      <div class="form-group"><label>Vendor Phone (optional)</label><input type="text" id="editVendorPhone"></div>
      <div class="form-group"><label>Amount Paid to Vendor (Rs)</label><input type="number" id="editVendorAmountPaid"></div>
      <div class="form-group"><label>Note (optional)</label><input type="text" id="editNote"></div>
      <div style="display:flex;gap:10px;margin-top:6px;width:100%;">
        <button class="btn-primary" onclick="saveEdit()" style="flex:1;">Save Entry</button>
        <button onclick="closeEditModal()" style="flex:1;background:var(--bg);border:1.5px solid var(--border-dark);color:var(--text-secondary);">Cancel</button>
      </div>
      <p id="editMsg" class="msg" style="width:100%;"></p>
    </div>
  </div>
</div>

<!-- ADD STOCK MODAL -->
<div id="addStockModal" class="modal-overlay hidden">
  <div class="modal-box" style="max-width:720px;">
    <h3 style="margin-bottom:16px;font-size:16px;font-weight:600;">Add Stock</h3>
    <div class="stock-form">
    <div class="form-group">
      <label>Product</label>
      <input list="productsList" id="stockProduct" placeholder="Select product">
      <datalist id="productsList"></datalist>
    </div>
    <div class="form-group">
      <label>Quantity Bought</label>
      <input type="number" id="stockQty" placeholder="e.g. 100">
    </div>
    <div class="form-group">
      <label>Unit</label>
      <select id="stockUnit">
        <option value="kg">kg</option>
        <option value="g">gram</option>
        <option value="piece">piece</option>
      </select>
    </div>
    <div class="form-group">
      <label>Total Purchase Cost (₹)</label>
      <input type="number" id="stockPurchaseCost" placeholder="e.g. 2000">
    </div>
    <div class="form-group">
      <label>Selling Price / Unit (₹)</label>
      <input type="number" id="stockSellingPrice" placeholder="e.g. 30">
    </div>
    <div class="form-group">
      <label>Selling Unit</label>
      <select id="stockSellingUnit">
        <option value="kg">kg</option>
        <option value="500g">500g</option>
        <option value="250g">250g</option>
        <option value="100g">100g</option>
        <option value="g">gram</option>
        <option value="piece">piece</option>
      </select>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="stockDate">
    </div>
    <div class="form-group">
      <label>Low Stock Alert (qty)</label>
      <input type="number" id="stockAlert" placeholder="e.g. 20">
    </div>
    <div class="form-group">
  <label>Vendor Name (optional)</label>
  <input type="text" id="vendorName" placeholder="e.g. Raju Supplier">
</div>
<div class="form-group">
  <label>Vendor Phone (optional)</label>
  <input type="text" id="vendorPhone" placeholder="e.g. 9876543210">
</div>
<div class="form-group">
  <label>Amount Paid to Vendor (₹)</label>
  <input type="number" id="vendorAmountPaid" placeholder="e.g. 1500">
</div>
    <div class="form-group">
      <label>Note (optional)</label>
      <input type="text" id="stockNote" placeholder="e.g. New lot from supplier">
    </div>
    <div style="display:flex;gap:10px;width:100%;"><button onclick="addStock()" class="btn-primary" style="flex:1;">Add to Inventory</button><button onclick="closeAddStockModal()" style="flex:1;background:var(--bg);border:1.5px solid var(--border-dark);color:var(--text-secondary);">Cancel</button></div>
    <p id="stockMsg" class="msg"></p>
  </div>
  </div>
</div>

<!-- CURRENT STOCK -->
<h2 onclick="toggleSection('currentStockSection')">▼ Current Stock</h2>
<div id="currentStockSection">
  <div id="stockCards" class="stock-grid">
    <div class="stock-card skeleton-stock-card">
      <div class="skeleton-line wide"></div>
      <div class="skeleton-qty"></div>
      <div class="card-divider"></div>
      <div class="skeleton-line medium"></div>
      <div class="skeleton-line short"></div>
    </div>
    <div class="stock-card skeleton-stock-card">
      <div class="skeleton-line wide"></div>
      <div class="skeleton-qty"></div>
      <div class="card-divider"></div>
      <div class="skeleton-line medium"></div>
      <div class="skeleton-line short"></div>
    </div>
    <div class="stock-card skeleton-stock-card">
      <div class="skeleton-line wide"></div>
      <div class="skeleton-qty"></div>
      <div class="card-divider"></div>
      <div class="skeleton-line medium"></div>
      <div class="skeleton-line short"></div>
    </div>
  </div>
</div>

<!-- FINISHED / ARCHIVED STOCK -->
<h2 onclick="toggleSection('finishedStockSection')">▼ Finished Products</h2>
<div id="finishedStockSection">
  <div id="finishedCards" class="stock-grid">
    <p class="empty-msg" id="finishedEmpty">No finished products</p>
  </div>
</div>



<!-- STOCK HISTORY -->
<h2 onclick="toggleSection('historySection')">▼ Stock History</h2>
<div id="historySection">
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Product</th>
        <th>Type</th>
        <th>Qty</th>
        <th>Cost/Unit</th>
        <th>Note</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="historyTable"></tbody>
  </table>
</div>

<script type="module" src="inventory.js?v=41"></script>
<script type="module" src="topbar.js"></script>
<script type="module" src="navbar.js?v=46"></script>

  <script src="pwa.js?v=59" defer></script>
</body>
</html>
