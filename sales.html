<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales — Zuno</title>
  <link rel="stylesheet" href="style.css?v=47">
  <style>
    .sales-header {
      max-width: 1000px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 16px;
      border-bottom: 1.5px solid var(--border);
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-bar {
      max-width: 1000px;
      margin: 0 auto 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      box-shadow: var(--shadow-sm);
    }

    .filter-bar input,
    .filter-bar select {
      height: 36px;
      font-size: 13px;
    }

    .filter-bar input[type="text"] { width: 180px; }
    .filter-bar input[type="date"] { width: 140px; }
    .filter-bar select { width: 120px; }

    .summary-strip {
      max-width: 1000px;
      margin: 0 auto 16px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .summary-chip {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      box-shadow: var(--shadow-sm);
    }

    .summary-chip-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .summary-chip-value {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 500;
      color: var(--text-primary);
    }

    #salesTableWrapper {
      max-width: 1000px;
      margin: 0 auto;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow-x: auto;
      overflow-y: hidden;
      box-shadow: var(--shadow-sm);
      margin-bottom: 100px;
      -webkit-overflow-scrolling: touch;
    }

    #salesTableWrapper table {
      margin: 0;
      border: none;
      border-radius: 0;
      box-shadow: none;
      min-width: 860px;
    }

    #salesTableWrapper td {
      overflow-wrap: anywhere;
    }

    #salesTableWrapper th:last-child,
    #salesTableWrapper td:last-child {
      white-space: nowrap;
    }

    .empty-sales {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .summary-strip { grid-template-columns: 1fr 1fr; }
      .filter-bar input[type="text"],
      .filter-bar input[type="date"],
      .filter-bar select { width: 100%; }
      #salesTableWrapper {
        margin-left: -12px;
        margin-right: -12px;
        border-left: 0;
        border-right: 0;
        border-radius: 0;
      }
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00236f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Zuno">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="zuno-icon-192.png">
</head>

<body>

<script type="module">
import { auth } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
onAuthStateChanged(auth, (user) => {
  if (!user) window.location.href = "login.html";
});
</script>

<!-- HEADER -->
<div class="sales-header">
  <div>
    <p style="font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;">Zuno</p>
    <h1 style="margin:0;border:none;padding:0;font-size:24px;">Sales</h1>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <a href="index.html#liveOrdersSection" style="display:inline-flex;align-items:center;text-decoration:none;background:var(--bg);color:var(--text-primary);border:1.5px solid var(--border-dark);padding:8px 14px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;font-family:var(--font);">Pending customer orders</a>
    <button onclick="openNewSaleModal()" style="background:var(--accent);color:white;border:none;padding:8px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);">+ New Sale</button>
  </div>
</div>

<!-- SUMMARY STRIP -->
<div class="summary-strip">
  <div class="summary-chip">
    <div class="summary-chip-label">Total Sales</div>
    <div class="summary-chip-value" id="ss_totalSales">₹0</div>
  </div>
  <div class="summary-chip">
    <div class="summary-chip-label">Total Profit</div>
    <div class="summary-chip-value" id="ss_totalProfit">₹0</div>
  </div>
  <div class="summary-chip">
    <div class="summary-chip-label">Orders</div>
    <div class="summary-chip-value" id="ss_totalOrders">0</div>
  </div>
  <div class="summary-chip">
    <div class="summary-chip-label">Pending</div>
    <div class="summary-chip-value" id="ss_pending">0</div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <input type="text" id="searchInput" placeholder="Search customer / order…" oninput="applyFilters()">
  <input type="date" id="filterDateFrom" onchange="applyFilters()">
  <span style="font-size:13px;color:var(--text-muted);">to</span>
  <input type="date" id="filterDateTo" onchange="applyFilters()">
  <select id="filterMonth" onchange="applyFilters()">
    <option value="">All Months</option>
  </select>
  <select id="filterYear" onchange="applyFilters()">
    <option value="">All Years</option>
  </select>
  <select id="filterPayment" onchange="applyFilters()">
    <option value="">All Payments</option>
    <option value="cash">Cash</option>
    <option value="upi">UPI</option>
    <option value="credit">Credit</option>
  </select>
  <select id="filterStatus" onchange="applyFilters()">
    <option value="">All Status</option>
    <option value="pending">Pending</option>
    <option value="delivered">Delivered</option>
  </select>
  <button onclick="clearFilters()" style="font-size:12px;padding:0 12px;height:36px;background:var(--bg);border:1.5px solid var(--border-dark);border-radius:var(--radius-sm);cursor:pointer;color:var(--text-secondary);font-family:var(--font);">Clear</button>
</div>

<!-- RECALC BUTTON -->
<div style="max-width:1000px;margin:0 auto 10px;">
  <button onclick="recalcAllSales()" style="font-size:13px;padding:6px 16px;background:var(--accent-light);color:var(--accent);border:1px solid #a8d5bc;border-radius:6px;cursor:pointer;">↻ Recalculate All Missing Profits</button>
</div>

<!-- SALES TABLE -->
<div id="salesTableWrapper">
  <table>
    <thead>
      <tr>
        <th>Order</th>
        <th>Date</th>
        <th>Customer</th>
        <th>Phone</th>
        <th>Items</th>
        <th>Amount</th>
        <th>Profit</th>
        <th>Payment</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="salesTableBody">
      <tr><td colspan="10" class="empty-sales">Loading...</td></tr>
    </tbody>
  </table>
</div>

<div id="saleCreditHistoryModal" class="modal-overlay hidden">
  <div class="modal-box" style="max-width:620px;">
    <div class="modal-head">
      <div class="modal-title" id="saleCreditHistoryTitle">Credit History</div>
      <button class="modal-close-btn" onclick="closeSaleCreditHistory()">×</button>
    </div>
    <div id="saleCreditHistoryBody"></div>
  </div>
</div>

<div id="saleCreditEditModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-title" id="saleCreditEditTitle">Edit Credit</div>
    <div id="saleCreditEditMeta" style="font-size:13px;color:var(--text-secondary);margin-bottom:14px;"></div>
    <div class="modal-form-group">
      <label>Credit Balance (₹)</label>
      <input type="number" id="saleCreditAmount" min="0" placeholder="Remaining credit">
    </div>
    <div class="modal-form-group">
      <label>Date</label>
      <input type="date" id="saleCreditDate">
    </div>
    <div class="modal-form-group">
      <label>Note</label>
      <input type="text" id="saleCreditNote" placeholder="Payment received / adjustment">
    </div>
    <div class="modal-actions">
      <button class="btn-modal-primary" onclick="saveSaleCreditEdit()">Save Credit</button>
      <button class="btn-modal-cancel" onclick="closeSaleCreditEdit()">Cancel</button>
    </div>
    <p id="saleCreditMsg" style="font-size:13px;color:var(--danger);margin-top:8px;min-height:18px;"></p>
  </div>
</div>

<script type="module" src="sales.js?v=40"></script>
<script type="module" src="topbar.js"></script>
<script type="module" src="navbar.js?v=66"></script>
<script src="pwa.js?v=63" defer></script>
</body>
</html>
