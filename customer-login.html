<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zuno Customer Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffda00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Zuno">
  <link rel="apple-touch-icon" href="zuno-icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      font-family: Manrope, system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 0%, rgba(255,218,0,.24), transparent 32%),
        radial-gradient(circle at 92% 100%, rgba(52,201,138,.16), transparent 34%),
        #f7f7f4;
      color: #111827;
    }
    .panel {
      width: min(100%, 440px);
      background: rgba(255,255,255,.9);
      border: 1px solid rgba(17,24,39,.08);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 24px 70px rgba(17,24,39,.1);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      margin-bottom: 18px;
      color: #111827;
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
    }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 26px; }
    .brand img { width: 52px; height: 52px; border-radius: 16px; }
    .brand strong { font-size: 22px; font-weight: 1000; letter-spacing: -.04em; }
    h1 { font-size: 32px; line-height: 1; letter-spacing: -.05em; margin-bottom: 10px; }
    p { color: #667085; line-height: 1.55; font-size: 14px; margin-bottom: 22px; }
    input {
      width: 100%;
      padding: 15px 16px;
      border-radius: 16px;
      border: 1px solid #d9dbe7;
      margin-bottom: 12px;
      font: inherit;
      outline: none;
    }
    input:focus { border-color: #111827; box-shadow: 0 0 0 4px rgba(17,24,39,.08); }
    button, .google-btn {
      width: 100%;
      min-height: 50px;
      border-radius: 16px;
      border: 0;
      font: inherit;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }
    button:disabled { opacity: .65; cursor: wait; }
    .primary-btn { background: #111827; color: white; box-shadow: 0 12px 28px rgba(17,24,39,.18); }
    .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .secondary-btn { background: #eef2ff; color: #111827; box-shadow: none; border: 1px solid #d9dbe7; }
    .google-btn {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: white;
      color: #111827;
      border: 1px solid #d9dbe7;
    }
    .google-btn svg { width: 18px; height: 18px; }
    .divider { text-align: center; margin: 16px 0; color: #98a2b3; font-size: 12px; font-weight: 900; }
    #msg { min-height: 20px; margin-top: 14px; color: #ba1a1a; font-size: 13px; line-height: 1.45; }
    #msg.ok { color: #087f5b; }
    @media (max-width: 600px) {
      input, select, textarea { font-size: 16px; }
    }
    .role-guard {
      display: none;
      gap: 10px;
      margin: 18px 0;
      padding: 16px;
      border: 1px solid #d9dbe7;
      border-radius: 18px;
      background: #fffdf2;
    }
    .role-guard.show { display: grid; }
    .role-guard strong { font-size: 16px; }
    .role-guard p { margin: 0; }
    .role-guard a {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: #111827;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 900;
    }
    .role-guard button { background: #eef2ff; color: #111827; border: 1px solid #d9dbe7; }
  </style>
</head>
<body>
  <main class="panel">
    <a class="back-link" href="shops.html">&lt; Back</a>
    <div class="brand">
      <img src="zuno-logo.png" alt="">
      <strong>Zuno Local</strong>
    </div>

    <h1>Customer login</h1>
    <p>Login once, keep your name and phone ready, then shop from local stores.</p>

    <section class="role-guard" id="roleGuard">
      <strong>You are logged in as a vendor.</strong>
      <p>Use the vendor dashboard for this account, or logout first to use a separate customer account.</p>
      <a href="home.html">Return to Dashboard</a>
      <button type="button" id="roleLogoutBtn">Logout and login as customer</button>
    </section>

    <div id="loginForm">
      <input id="customerName" autocomplete="name" placeholder="Your name">
      <input id="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="Phone number, e.g. 9876543210">
      <input id="password" type="password" autocomplete="current-password" placeholder="Password">
      <div class="button-row">
      <button class="primary-btn" id="phonePasswordLoginBtn">Login</button>
      <button class="primary-btn secondary-btn" id="phonePasswordSignupBtn">Create Account</button>
      </div>

      <div class="divider">OTP LATER</div>

      <input id="otp" inputmode="numeric" autocomplete="one-time-code" placeholder="Enter OTP" hidden>

      <button class="primary-btn" id="sendOtpBtn">Send OTP</button>
      <button class="primary-btn" id="verifyOtpBtn" hidden>Verify & Continue</button>
      <div id="recaptcha-container"></div>

      <div class="divider">OR</div>

      <button class="google-btn" id="googleBtn">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06L5.84 9.9C6.71 7.31 9.14 5.38 12 5.38z"/>
      </svg>
      Continue with Google
      </button>
    </div>

    <p id="msg"></p>
  </main>

  <script type="module" src="customer-login.js"></script>
  <script src="pwa.js" defer></script>
</body>
</html>
