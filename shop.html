<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shop.css?v=8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffda00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Zuno">
  <link rel="apple-touch-icon" href="zuno-icon-192.png">
</head>
<body>
  <div id="shop-topbar"></div>

  <main class="shop-main">
    <section class="hero-card">
      <div class="hero-copy">
        <small>Today's picks</small>
        <h1 id="heroTitle">Fresh from the market</h1>
        <p id="heroSub">Loading shop...</p>
        <div class="shop-status-row" id="shopStatusRow"></div>
      </div>
      <div class="hero-market-stack" aria-hidden="true">
        <span>Fresh</span>
        <b>Local</b>
      </div>
    </section>

    <div class="toolbar">
      <input class="search-input" id="searchInput" type="search" list="shopProductSuggestions" placeholder="Search products..." oninput="filterProducts()">
      <datalist id="shopProductSuggestions"></datalist>
      <button class="filter-button" type="button" aria-label="Filter">Filter</button>
    </div>

    <div class="quick-strip">
      <div class="quick-card"><strong id="fulfillmentTitle">Express</strong><span id="fulfillmentSub">Fast pickup</span></div>
      <div class="quick-card" id="stockQuickCard"><strong>Live stock</strong><span>Updated now</span></div>
      <div class="quick-card"><strong>COD</strong><span>Pay later</span></div>
    </div>

    <div class="section-head category-head" id="typeSectionHeading">
      <h2>Shop by type</h2>
      <button class="section-link" type="button" onclick="setTypeFilter('all', this)">All</button>
    </div>

    <div class="category-row" id="typeRow">
      <button class="category-chip active" onclick="setTypeFilter('all', this)">
        <span class="category-image category-all">All</span>
        All
      </button>
    </div>

    <div class="section-head">
      <h2 id="productsHeading">Shop by items</h2>
      <a href="shops.html">All shops</a>
    </div>

    <section id="foodSpecialsSection" hidden>
      <div class="section-head">
        <h2>Today's specials</h2>
      </div>
      <div class="products-grid" id="foodSpecialsGrid"></div>
    </section>

    <section class="products-grid" id="productsGrid">
      <article class="product-card skeleton-card">
        <div class="product-art skeleton-block"></div>
        <div class="product-body">
          <div class="skeleton-line wide"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-button"></div>
        </div>
      </article>
      <article class="product-card skeleton-card">
        <div class="product-art skeleton-block"></div>
        <div class="product-body">
          <div class="skeleton-line wide"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-button"></div>
        </div>
      </article>
      <article class="product-card skeleton-card">
        <div class="product-art skeleton-block"></div>
        <div class="product-body">
          <div class="skeleton-line wide"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-button"></div>
        </div>
      </article>
    </section>
  </main>

  <div id="shop-navbar"></div>

  <script type="module" src="shop.js"></script>
  <script src="pwa.js" defer></script>
</body>
</html>
