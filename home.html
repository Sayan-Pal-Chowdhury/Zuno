<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Zuno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="home.css?v=74">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#34c98a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Zuno">
  <link rel="apple-touch-icon" href="zuno-icon-192.png">
</head>
<body>
  <main class="chat-home">
    <section class="hero-card" aria-label="Business summary">
      <div class="hero-top">
        <div>
          <p class="hero-eyebrow" id="heroGreeting">Good morning</p>
          <h1>Good <span id="heroDayPart">morning</span>, <span id="heroName">there</span></h1>
          <p id="heroSubline">Your shop is moving well today 🌿</p>
        </div>
        <div class="hero-sun">☀</div>
      </div>
      <div class="hero-date">
        <button id="previousDateBtn" type="button" aria-label="Previous date">&lt;</button>
        <input id="overviewDate" type="date">
        <button id="nextDateBtn" type="button" aria-label="Next date">&gt;</button>
      </div>
      <div class="hero-metrics">
        <div>
          <span>Sales</span>
          <strong id="selectedSales">Rs 0</strong>
        </div>
        <div>
          <span>Profit</span>
          <strong id="selectedProfit">Rs 0</strong>
        </div>
        <button class="hero-pending" id="pendingSummaryBtn" type="button">
          <span>Pending</span>
          <strong id="selectedPending">0</strong>
        </button>
      </div>
    </section>
    <button class="hero-toggle" id="heroToggleBtn" type="button" aria-label="Show summary">⌄</button>

    <section class="chat-panel">
      <div class="chat-thread" id="chatThread" aria-live="polite">
        <button class="load-older" id="loadOlderBtn" type="button" hidden>Load older chats</button>
        <article class="bubble assistant">
          <p>Do you have any query, sale or stock update?</p>
          <p class="hint">Type naturally, for example: Add sale Khitish 10kg alu @15 credit delivered</p>
        </article>
      </div>
    </section>
  </main>

  <section class="composer-shell">
    <div class="quick-prompts" aria-label="Actions">
      <button type="button" data-prompt="Query: ">? Query</button>
      <button type="button" data-prompt="Add sale ">+ Sale</button>
      <button type="button" data-prompt="Add inventory ">□ Stock</button>
    </div>
    <div class="composer-menu" id="composerMenu" hidden>
      <button id="voiceChatBtn" type="button">
        <span class="menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3Z"/><path d="M19 11a7 7 0 0 1-14 0"/><path d="M12 18v3"/><path d="M8 21h8"/></svg></span>
        Voice
      </button>
      <button id="resetChatBtn" type="button">
        <span class="menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 12a7 7 0 1 0 2-5"/><path d="M5 4v5h5"/></svg></span>
        Reset chat
      </button>
    </div>
    <div class="fast-mode-menu" id="fastModeMenu" hidden>
      <button type="button" data-fast-mode="ask">Ask every time</button>
      <button type="button" data-fast-mode="cash-delivered">Cash + Delivered</button>
      <button type="button" data-fast-mode="cash-pending">Cash + Pending</button>
      <button type="button" data-fast-mode="upi-delivered">UPI + Delivered</button>
      <button type="button" data-fast-mode="credit-pending">Credit + Pending</button>
    </div>
    <form class="composer" id="chatForm">
      <button class="mode-chip" id="fastModeBtn" type="button" aria-label="Sale mode">
        <span id="fastModeLabel">Ask</span>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 10 5 5 5-5"/></svg>
      </button>
      <input id="chatInput" type="text" placeholder="Type a sale, stock update, or query..." autocomplete="off">
      <button class="tool-button menu-toggle" id="composerMenuBtn" type="button" aria-label="More actions" title="More actions">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 6.5h.01M12 12h.01M12 17.5h.01"/></svg>
      </button>
      <button class="send-button" id="sendBtn" type="submit" aria-label="Send" title="Send">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>
      </button>
    </form>
  </section>

  <div class="home-toast" id="homeToast"></div>
  <div class="pending-modal" id="pendingModal" hidden>
    <div class="pending-backdrop" id="pendingBackdrop"></div>
    <section class="pending-sheet" aria-label="Pending orders">
      <div class="pending-handle"></div>
      <div class="pending-head">
        <div>
          <p>Pending orders</p>
          <h2 id="pendingModalCount">0 waiting</h2>
        </div>
        <button id="pendingCloseBtn" type="button" aria-label="Close pending orders">×</button>
      </div>
      <div class="pending-list" id="pendingOrderList"></div>
      <button class="pending-open-orders" id="pendingOpenOrdersBtn" type="button">Open order page</button>
    </section>
  </div>

  <script type="module" src="home.js?v=74"></script>
  <script type="module" src="topbar.js"></script>
  <script type="module" src="navbar.js?v=66"></script>
  <script src="pwa.js?v=74" defer></script>
</body>
</html>
